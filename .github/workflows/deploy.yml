name: Deploy to GitHub Pages

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          if [[ "$REPO_NAME" == *.github.io ]]; then
            npm run build
          else
            npm run build -- --base "/${REPO_NAME}/"
          fi
      - name: Validate build output
        run: |
          test -d dist || { echo "dist directory missing after build"; exit 1; }
          test -f dist/index.html || { echo "dist/index.html missing after build"; exit 1; }
      - name: Upload artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
        continue-on-error: true
      - name: Fail with setup guidance if Pages is not configured
        if: steps.pages.outcome == 'failure'
        run: |
          echo "::error::GitHub Pages is not enabled for GitHub Actions or this token cannot access it."
          echo "::error::Open Settings -> Pages, set 'Build and deployment' source to 'GitHub Actions', then rerun this workflow on main."
          exit 1
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
